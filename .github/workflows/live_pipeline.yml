name: Live Match Alert Pipeline

on:
  schedule:
    # Runs every 15 minutes, 24/7.
    # The budget guardrail in main.py will exit early (0 API requests) if no games are scheduled today.
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Needed to commit sent_alerts.json and schedule.json back to the repo

jobs:
  run-anomaly-detector:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Alert Engine
      env:
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_FREE_CHANNEL_ID: ${{ secrets.TELEGRAM_FREE_CHANNEL_ID }}
        TELEGRAM_PREMIUM_CHANNEL_ID: ${{ secrets.TELEGRAM_PREMIUM_CHANNEL_ID }}
      run: python main.py

    - name: Commit and Push State Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add sent_alerts.json schedule.json || true
        git commit -m "chore: Update sent alerts state and cached match schedule [skip ci]" || exit 0
        git push

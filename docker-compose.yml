version: '3.8'

services:
  # 🌐 Node 1: The FastAPI Web Engine
  web_backend:
    build: .
    container_name: arena_web_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    environment:
      - RAPIDAPI_KEY=${RAPIDAPI_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_FREE_CHANNEL_ID=${TELEGRAM_FREE_CHANNEL_ID}
      - TELEGRAM_PREMIUM_CHANNEL_ID=${TELEGRAM_PREMIUM_CHANNEL_ID}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - arena_network

  # 🐍 Node 2: The Web3 Blockchain Watcher
  watcher_daemon:
    build: .
    container_name: arena_watcher_daemon
    restart: unless-stopped
    # Executes the watcher script instead of a web server
    command: python watcher.py
    environment:
      - WEB3_PROVIDER_RPC_URL=${WEB3_PROVIDER_RPC_URL}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - arena_network

  # 🤖 Node 3: The Telegram Billing & Payment Daemon
  payment_daemon:
    build: .
    container_name: arena_payment_daemon
    restart: unless-stopped
    command: python components/payments/payment_daemon.py
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_PAYMENT_PROVIDER_TOKEN=${TELEGRAM_PAYMENT_PROVIDER_TOKEN}
      - SAFARICOM_DARAJA_CONSUMER_KEY=${SAFARICOM_DARAJA_CONSUMER_KEY}
      - SAFARICOM_DARAJA_CONSUMER_SECRET=${SAFARICOM_DARAJA_CONSUMER_SECRET}
      - SAFARICOM_SHORTCODE=${SAFARICOM_SHORTCODE}
      - SAFARICOM_PASSKEY=${SAFARICOM_PASSKEY}
      - SAFARICOM_CALLBACK_URL=${SAFARICOM_CALLBACK_URL}
      - CRYPTOPAY_API_KEY=${CRYPTOPAY_API_KEY}
      - CRYPTOPAY_WEBHOOK_SECRET=${CRYPTOPAY_WEBHOOK_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - TELEGRAM_FREE_CHANNEL_ID=${TELEGRAM_FREE_CHANNEL_ID}
      - TELEGRAM_PREMIUM_CHANNEL_ID=${TELEGRAM_PREMIUM_CHANNEL_ID}
    networks:
      - arena_network

networks:
  arena_network:
    driver: bridge

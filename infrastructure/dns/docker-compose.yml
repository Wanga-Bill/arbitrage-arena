version: '3.8'

services:
  powerdns:
    image: powerdns/pdns-auth-master:latest
    container_name: arena_dns_server
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8081:8081/tcp" # REST API Port
    environment:
      - PDNS_gsqlite3_database=/var/lib/powerdns/pdns.sqlite3
      - PDNS_api=yes
      - PDNS_api_key=${PDNS_API_KEY} # Your secure terminal access key
      - PDNS_webserver=yes
      - PDNS_webserver_address=0.0.0.0
      - PDNS_webserver_allow_from=0.0.0.0/0
    volumes:
      - pdns_data:/var/lib/powerdns

volumes:
  pdns_data:
